services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: expose
      POSTGRES_USER: expose
      POSTGRES_PASSWORD: expose-dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "expose"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: >
      sh -c "expose db upgrade && expose serve --host 0.0.0.0 --port 8090 --no-otel"
    environment:
      EXPOSE_DB_HOST: postgres
      EXPOSE_DB_PORT: "5432"
      EXPOSE_DB_DATABASE: expose
      EXPOSE_DB_USER: expose
      EXPOSE_DB_PASSWORD: expose-dev
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
