# EXPOSE Core — default Helm values.
#
# Per ADR-003 §"State is externalized" — operators must provide:
#   - Postgres connection (managed Postgres recommended for production; in-cluster
#     postgres only for dev/lab per #2 production deployment documentation issue)
#   - Object storage credentials (S3-compatible: MinIO/AWS S3/Azure Blob/GCS)
#   - Secrets backend reference (Vaultwarden/AWS SM/Azure KV/GCP Secret Manager)
#
# Per ADR-007: tenant context is injected via middleware; values configure the
# default tenant lifecycle. Multi-tenant deployments add tenants via the admin
# API once available (Phase 3 production-hardening, #23).
#
# Per ADR-010: FIPS-validated cryptography enforced via container image; Helm
# does not relax this. Observability via OpenTelemetry exporters operators wire
# to their own backend.

global:
  # OCI image source — operators may override to point at internal registry
  # mirrors (federal customers self-hosting per the federal deployment guide).
  imageRegistry: "ghcr.io/korlogos"
  imagePullSecrets: []

  # FIPS 140-2 validated cryptography mode. When true, the container image
  # uses FIPS-validated crypto providers per ADR-010. The Helm chart sets the
  # env var; enforcement is in the application and container image.
  fipsMode: false

image:
  repository: expose
  pullPolicy: IfNotPresent
  # Set explicitly per release; chart appVersion is the default.
  tag: ""

nameOverride: ""
fullnameOverride: ""

# Default tenant — v1 deployment ships with a single tenant. Multi-tenant
# lifecycle deferred to Phase 3 production-hardening (#23 Tenant lifecycle API).
tenant:
  defaultId: "00000000-0000-0000-0000-000000000000"
  defaultName: "default"

# === Control plane ==========================================================
controlPlane:
  enabled: true
  replicaCount: 1
  resources:
    requests: { cpu: "200m", memory: "256Mi" }
    limits:   { cpu: "1000m", memory: "512Mi" }
  service:
    type: ClusterIP
    port: 8090
  # Pod disruption budget — ensures at least 1 pod is available during
  # voluntary disruptions (node drain, rolling update).
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  # Liveness and readiness probes. The control-plane exposes /healthz.
  probes:
    liveness:
      enabled: true
      path: /healthz
      port: http
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      enabled: true
      path: /healthz
      port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3

# === Workers ================================================================
collectorWorker:
  enabled: true
  replicaCount: 2
  concurrency: 4  # max concurrent collection tasks per pod
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

scannerWorker:
  enabled: true
  replicaCount: 2
  concurrency: 2  # max concurrent scan tasks per pod (lower — active scanning is heavier)
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  # EgressProfile per ADR-003 §"Scanner egress" + #1 active-scanner-egress
  # issue. Operators MUST configure an explicit egress profile for production;
  # the chart fails closed if `direct` is used in non-cloud deployments.
  egressProfile:
    type: "direct"  # direct | socks5 | wireguard | http_connect
    # Tor / public-proxy egress per #39: configure as socks5 with explicit
    # operator attestation. The artifact records `egress_anonymized: true`
    # automatically when an anonymizing endpoint is configured.
    config: {}

llmWorker:
  enabled: false  # off in v1 (Phase 1); turn on for Phase 2 LLM enrichment.
  replicaCount: 1
  resources:
    requests: { cpu: "200m", memory: "1Gi" }
    limits:   { cpu: "2000m", memory: "4Gi" }
  # Per ADR-005 multi-provider abstraction. Operators provide credentials
  # via the secrets backend reference; never inline in values.
  provider: "ollama"
  costCeilingUSD: 5.00

# === State services (operator-provided in production) =======================
postgres:
  # In-cluster Postgres is dev-only per #2. For production, leave .enabled
  # false and provide existingSecret + host below.
  enabled: false
  # External Postgres connection (production):
  host: ""
  port: 5432
  database: "expose"
  existingSecret: ""        # Kubernetes secret containing user/password keys
  sslmode: "require"

objectStorage:
  # MinIO for lab; S3-compatible cloud bucket for production.
  enabled: false             # in-cluster MinIO; lab-only
  endpoint: ""               # external object store endpoint
  bucket: "expose-artifacts"
  region: "us-east-1"
  existingSecret: ""         # credentials secret
  forcePathStyle: false      # set true for MinIO / non-AWS S3

secretsBackend:
  # SecretsProvider abstraction per ADR-003. v1 implementations: vaultwarden,
  # aws-secrets-manager. Vault, Azure KV, GCP SM deferred (#8).
  type: "aws-secrets-manager"
  config: {}

# === Observability ==========================================================
observability:
  # OpenTelemetry per ADR-003. Operator wires to whatever backend the
  # deployment provides (Prometheus + Loki + Tempo on ARC; CloudWatch on AWS).
  otlp:
    enabled: true
    endpoint: ""            # otlp://prometheus.observability.svc:4317 etc.
    insecure: false

  # Bundled "everything included" subchart deferred to #7.
  bundled:
    enabled: false

  # Prometheus scrape annotations on pods. Enable to have Prometheus
  # auto-discover and scrape the /metrics endpoint.
  prometheus:
    enabled: true
    port: 9090
    path: /metrics

# === NATS JetStream (per ADR-003 / #36) =====================================
nats:
  # In-cluster NATS is dev/lab-only; production uses an operator-managed
  # NATS cluster or a managed JetStream service.
  enabled: false
  # External NATS URL (production). When nats.enabled=false AND this is set,
  # workers connect to this URL instead of the in-cluster NATS service.
  externalUrl: ""
  clientPort: 4222
  clusterPort: 6222
  replicas: 1

# === Network policies (per #4 deployment-portability epic) ==================
# Full per-component policies: default deny, then explicit allow for each
# component's minimum required connectivity. See templates/networkpolicy.yaml.
networkPolicy:
  enabled: true
  defaultDeny: true

  # Control-plane (API server) ingress — restrict to specific CIDRs in
  # production. "0.0.0.0/0" is wide open; operators SHOULD narrow this to
  # their ingress controller, load balancer, or VPN CIDR.
  apiServer:
    ingressCIDR: "0.0.0.0/0"

  # Collector worker egress — passive collectors call public HTTPS APIs.
  # The NetworkPolicy allows port 443 to non-RFC-1918 addresses; the domain
  # allowlist below is informational (NetworkPolicy cannot filter by DNS
  # name; use a CNI with DNS-aware policy — Cilium CiliumNetworkPolicy or
  # Calico GlobalNetworkPolicy — for domain-level enforcement).
  collectorEgress:
    httpsEnabled: true
    allowedDomains:
      - crt.sh
      - rdap.org
      - ip-ranges.amazonaws.com
      - download.microsoft.com
      - www.gstatic.com

  # Scanner worker egress — active scanners reach target hosts on 80/443.
  # Operators MUST review the egress profile (values.scannerWorker.egressProfile)
  # in conjunction with this policy.
  scannerEgress:
    enabled: true
    proxyPort: 1080  # SOCKS5/HTTP CONNECT proxy port for non-direct profiles

# === Pod security ===========================================================
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

# Pod Security Standards — namespace-level enforcement via Kubernetes
# built-in Pod Security Admission (replaces deprecated PodSecurityPolicy).
# See templates/podsecurity.yaml.
security:
  podSecurityStandards:
    enabled: true
    # Set to true to have the chart create the namespace with PSA labels.
    # If the namespace is managed externally (GitOps, Terraform, etc.),
    # leave false and apply the labels via your namespace provisioning tool.
    createNamespace: false
    # Pod Security Standards profile: baseline | restricted
    # "restricted" is the hardened default per ADR-010 FIPS posture.
    enforce: "restricted"
    audit: "restricted"
    warn: "restricted"
    # Pin to a specific PSS version or use "latest".
    version: "latest"

serviceAccount:
  create: true
  name: ""
  annotations: {}

# === Ingress ================================================================
ingress:
  enabled: false
  className: ""
  annotations: {}
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    # traefik.ingress.kubernetes.io/router.tls: "true"
  tls: []
  #  - secretName: expose-tls
  #    hosts:
  #      - expose.example.com
  hosts: []
  #  - host: expose.example.com
  #    paths:
  #      - path: /
  #        pathType: Prefix

# === Run scheduling =========================================================
runSchedule:
  # Per-tenant cron expression for default daily runs. Operators override
  # per-tenant via tenant config (Phase 3 admin API).
  defaultCron: "0 2 * * *"  # 02:00 UTC daily
