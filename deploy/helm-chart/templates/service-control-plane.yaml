{{- if .Values.controlPlane.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "expose.fullname" . }}-control-plane
  labels:
    {{- include "expose.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
  {{- if .Values.observability.prometheus.enabled }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.observability.prometheus.port | quote }}
    prometheus.io/path: {{ .Values.observability.prometheus.path | quote }}
  {{- end }}
spec:
  type: {{ .Values.controlPlane.service.type }}
  ports:
    - port: {{ .Values.controlPlane.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "expose.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
{{- end }}
