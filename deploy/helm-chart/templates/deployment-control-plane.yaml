{{- if .Values.controlPlane.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "expose.fullname" . }}-control-plane
  labels:
    {{- include "expose.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: {{ .Values.controlPlane.replicaCount }}
  selector:
    matchLabels:
      {{- include "expose.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        {{- include "expose.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
      annotations:
        {{- if .Values.observability.prometheus.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.observability.prometheus.port | quote }}
        prometheus.io/path: {{ .Values.observability.prometheus.path | quote }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "expose.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: control-plane
          image: {{ include "expose.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["expose"]
          args: ["serve", "--host", "0.0.0.0", "--port", {{ .Values.controlPlane.service.port | quote }}]
          env:
            - name: EXPOSE_DB_HOST
              value: {{ .Values.postgres.host | quote }}
            - name: EXPOSE_DB_PORT
              value: {{ .Values.postgres.port | quote }}
            - name: EXPOSE_DB_DATABASE
              value: {{ .Values.postgres.database | quote }}
            - name: EXPOSE_DB_SSLMODE
              value: {{ .Values.postgres.sslmode | quote }}
            {{- if .Values.postgres.existingSecret }}
            - name: EXPOSE_DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecret }}
                  key: user
            - name: EXPOSE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecret }}
                  key: password
            {{- end }}
            {{- if .Values.nats.enabled }}
            - name: EXPOSE_NATS_URL
              value: "nats://{{ include "expose.fullname" . }}-nats:{{ .Values.nats.clientPort }}"
            {{- else if .Values.nats.externalUrl }}
            - name: EXPOSE_NATS_URL
              value: {{ .Values.nats.externalUrl | quote }}
            {{- end }}
            {{- if .Values.objectStorage.endpoint }}
            - name: EXPOSE_S3_ENDPOINT
              value: {{ .Values.objectStorage.endpoint | quote }}
            - name: EXPOSE_S3_BUCKET
              value: {{ .Values.objectStorage.bucket | quote }}
            - name: EXPOSE_S3_REGION
              value: {{ .Values.objectStorage.region | quote }}
            - name: EXPOSE_S3_FORCE_PATH_STYLE
              value: {{ .Values.objectStorage.forcePathStyle | quote }}
            {{- end }}
            {{- if .Values.objectStorage.existingSecret }}
            - name: EXPOSE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.objectStorage.existingSecret }}
                  key: access-key
            - name: EXPOSE_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.objectStorage.existingSecret }}
                  key: secret-key
            {{- end }}
            - name: EXPOSE_DEFAULT_TENANT_ID
              value: {{ .Values.tenant.defaultId | quote }}
            - name: EXPOSE_FIPS_MODE
              value: {{ .Values.global.fipsMode | quote }}
            - name: EXPOSE_LOG_LEVEL
              value: "info"
            - name: EXPOSE_LOG_FORMAT
              value: "json"
          ports:
            - name: http
              containerPort: {{ .Values.controlPlane.service.port }}
              protocol: TCP
            {{- if .Values.observability.prometheus.enabled }}
            - name: metrics
              containerPort: {{ .Values.observability.prometheus.port }}
              protocol: TCP
            {{- end }}
          {{- if .Values.controlPlane.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.controlPlane.probes.liveness.path }}
              port: {{ .Values.controlPlane.probes.liveness.port }}
            initialDelaySeconds: {{ .Values.controlPlane.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.controlPlane.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.controlPlane.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.controlPlane.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.controlPlane.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.controlPlane.probes.readiness.path }}
              port: {{ .Values.controlPlane.probes.readiness.port }}
            initialDelaySeconds: {{ .Values.controlPlane.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.controlPlane.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.controlPlane.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.controlPlane.probes.readiness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
{{- end }}
