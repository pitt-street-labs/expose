{{- if .Values.collectorWorker.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "expose.fullname" . }}-collector-worker
  labels:
    {{- include "expose.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector-worker
spec:
  replicas: {{ .Values.collectorWorker.replicaCount }}
  selector:
    matchLabels:
      {{- include "expose.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: collector-worker
  template:
    metadata:
      labels:
        {{- include "expose.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: collector-worker
      annotations:
        {{- if .Values.observability.prometheus.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.observability.prometheus.port | quote }}
        prometheus.io/path: {{ .Values.observability.prometheus.path | quote }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "expose.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: collector-worker
          image: {{ include "expose.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["expose", "worker", "--kind", "collector"]
          env:
            {{- if .Values.nats.enabled }}
            - name: EXPOSE_NATS_URL
              value: "nats://{{ include "expose.fullname" . }}-nats:{{ .Values.nats.clientPort }}"
            {{- else if .Values.nats.externalUrl }}
            - name: EXPOSE_NATS_URL
              value: {{ .Values.nats.externalUrl | quote }}
            {{- end }}
            - name: EXPOSE_DB_HOST
              value: {{ .Values.postgres.host | quote }}
            - name: EXPOSE_DB_PORT
              value: {{ .Values.postgres.port | quote }}
            - name: EXPOSE_DB_DATABASE
              value: {{ .Values.postgres.database | quote }}
            - name: EXPOSE_DB_SSLMODE
              value: {{ .Values.postgres.sslmode | quote }}
            {{- if .Values.postgres.existingSecret }}
            - name: EXPOSE_DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecret }}
                  key: user
            - name: EXPOSE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecret }}
                  key: password
            {{- end }}
            {{- if .Values.objectStorage.endpoint }}
            - name: EXPOSE_S3_ENDPOINT
              value: {{ .Values.objectStorage.endpoint | quote }}
            - name: EXPOSE_S3_BUCKET
              value: {{ .Values.objectStorage.bucket | quote }}
            - name: EXPOSE_S3_REGION
              value: {{ .Values.objectStorage.region | quote }}
            - name: EXPOSE_S3_FORCE_PATH_STYLE
              value: {{ .Values.objectStorage.forcePathStyle | quote }}
            {{- end }}
            {{- if .Values.objectStorage.existingSecret }}
            - name: EXPOSE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.objectStorage.existingSecret }}
                  key: access-key
            - name: EXPOSE_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.objectStorage.existingSecret }}
                  key: secret-key
            {{- end }}
            - name: EXPOSE_DEFAULT_TENANT_ID
              value: {{ .Values.tenant.defaultId | quote }}
            - name: EXPOSE_WORKER_CONCURRENCY
              value: {{ .Values.collectorWorker.concurrency | quote }}
            - name: EXPOSE_FIPS_MODE
              value: {{ .Values.global.fipsMode | quote }}
            - name: EXPOSE_LOG_LEVEL
              value: "info"
            - name: EXPOSE_LOG_FORMAT
              value: "json"
          {{- if .Values.observability.prometheus.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.observability.prometheus.port }}
              protocol: TCP
          {{- end }}
          resources:
            {{- toYaml .Values.collectorWorker.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
{{- end }}
