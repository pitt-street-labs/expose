{{- if .Values.nats.enabled -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "expose.fullname" . }}-nats
  labels:
    {{- include "expose.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  serviceName: {{ include "expose.fullname" . }}-nats
  replicas: {{ .Values.nats.replicas }}
  selector:
    matchLabels:
      {{- include "expose.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nats
  template:
    metadata:
      labels:
        {{- include "expose.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nats
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: nats
          image: nats:2.10-alpine
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["-js", "-sd", "/data"]
          ports:
            - containerPort: {{ .Values.nats.clientPort }}
              name: client
              protocol: TCP
            - containerPort: {{ .Values.nats.clusterPort }}
              name: cluster
              protocol: TCP
          volumeMounts:
            - name: nats-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: nats-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
{{- end }}
