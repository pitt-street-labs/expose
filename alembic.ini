# Alembic configuration for EXPOSE.
#
# Connection URL is built at runtime from EXPOSE_DB_* environment variables
# (see src/expose/db/engine.py) — this file leaves sqlalchemy.url empty so
# `alembic upgrade head` always picks up the live env.

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url =
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# We use timezone-aware UTC timestamps in migration filenames.
timezone = UTC

# Per Alembic docs, leaving version_locations unset means scripts under
# alembic/versions/ are picked up automatically.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
